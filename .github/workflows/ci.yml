name: CI

on:
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"

  pack-and-publish:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/NLTechnologies.LockIt/NLTechnologies.LockIt.csproj

      - name: Build net8.0
        run: dotnet build src/NLTechnologies.LockIt/NLTechnologies.LockIt.csproj -c Release --no-restore -f net8.0

      - name: Build net9.0
        run: dotnet build src/NLTechnologies.LockIt/NLTechnologies.LockIt.csproj -c Release --no-restore -f net9.0

      - name: Build net10.0
        run: dotnet build src/NLTechnologies.LockIt/NLTechnologies.LockIt.csproj -c Release --no-restore -f net10.0

      - name: Pack
        run: dotnet pack src/NLTechnologies.LockIt/NLTechnologies.LockIt.csproj -c Release --no-build --output ./artifacts

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

      - name: Publish to NuGet.org
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
